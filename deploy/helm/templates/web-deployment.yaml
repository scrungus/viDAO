apiVersion: apps/v1
kind: Deployment
metadata:
  name: vidao-web
  namespace: {{ include "vidao.namespace" . }}
  labels:
    {{- include "vidao.labels" . | nindent 4 }}
    app: vidao-web
spec:
  replicas: {{ .Values.web.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vidao-web
  template:
    metadata:
      labels:
        {{- include "vidao.labels" . | nindent 8 }}
        app: vidao-web
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres {{ .Values.postgres.service.port }}; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: vidao-web
            - configMapRef:
                name: vidao-contracts
            - secretRef:
                name: {{ .Values.secrets.secretName }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vidao-web-data
