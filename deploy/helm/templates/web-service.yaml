apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: {{ include "vidao.namespace" . }}
  labels:
    {{- include "vidao.labels" . | nindent 4 }}
    app: vidao-web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: vidao-web
