name: stack-test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  stack-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLUSTER_NAME: vidao
      REGISTRY_NAME: vidao-registry
      REGISTRY_PORT: "5000"
      NAMESPACE: vidao-ci
      WEB_IMAGE: k3d-vidao-registry.localhost:5000/vidao-web:ci
      DEPLOYER_IMAGE: k3d-vidao-registry.localhost:5000/vidao-deployer:ci

    steps:
      - uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - name: Cache cargo / rustup
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/contracts/stylus/**/Cargo.lock', 'contracts/contracts/stylus/**/rust-toolchain.toml') }}

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}-${{ hashFiles('apps/web/src/**') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create k3d cluster
        uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          args: >-
            --agents 1
            --registry-create ${{ env.REGISTRY_NAME }}.localhost:${{ env.REGISTRY_PORT }}
            --wait

      - name: Install kubectl + helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.web
          target: runner
          push: true
          tags: ${{ env.WEB_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push deployer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.deployer
          push: true
          tags: ${{ env.DEPLOYER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Helm install
        run: |
          helm upgrade --install vidao ./deploy/helm \
            --namespace "$NAMESPACE" --create-namespace \
            -f ./deploy/helm/values.yaml \
            -f ./deploy/helm/values-ci.yaml \
            --wait --timeout 10m

      - name: Wait for deployer Job
        run: |
          kubectl -n "$NAMESPACE" wait --for=condition=complete job/vidao-deployer --timeout=5m

      - name: Wait for web Deployment
        run: |
          kubectl -n "$NAMESPACE" rollout status deployment/vidao-web --timeout=5m

      - name: Dump cluster state
        if: always()
        run: |
          kubectl -n "$NAMESPACE" get all
          kubectl -n "$NAMESPACE" get configmap vidao-contracts -o yaml || true
          kubectl -n "$NAMESPACE" logs job/vidao-deployer || true
          kubectl -n "$NAMESPACE" logs deployment/vidao-web --all-containers --tail=200 || true

      - name: Run CI tests
        run: |
          if [ -x ./deploy/scripts/run-ci-tests.sh ]; then
            ./deploy/scripts/run-ci-tests.sh
          else
            echo "[ci] no test suite wired up yet — stack bring-up is the assertion"
          fi

      - name: Uninstall
        if: always()
        run: helm uninstall vidao --namespace "$NAMESPACE" || true
