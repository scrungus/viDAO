name: stack-test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  stack-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck deploy/scripts/stack-smoke.sh deploy/scripts/run-tests.sh || true
      - name: Syntax-check bash
        run: |
          bash -n deploy/scripts/stack-smoke.sh
          bash -n deploy/scripts/run-tests.sh

  stack-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLUSTER_NAME: vidao
      REGISTRY_NAME: vidao-registry
      REGISTRY_PORT: "5000"
      NAMESPACE: vidao-ci
      WEB_IMAGE: k3d-vidao-registry.localhost:5000/vidao-web:ci
      DEPLOYER_IMAGE: k3d-vidao-registry.localhost:5000/vidao-deployer:ci

    steps:
      - uses: actions/checkout@v4

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - name: Cache cargo / rustup
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/contracts/stylus/**/Cargo.lock', 'contracts/contracts/stylus/**/rust-toolchain.toml') }}

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('apps/web/package-lock.json') }}-${{ hashFiles('apps/web/src/**') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create k3d cluster
        uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          args: >-
            --agents 1
            --registry-create ${{ env.REGISTRY_NAME }}.localhost:${{ env.REGISTRY_PORT }}
            --wait

      - name: Install kubectl + helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.web
          target: runner
          push: true
          tags: ${{ env.WEB_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push deployer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.deployer
          push: true
          tags: ${{ env.DEPLOYER_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install web deps for migrations + fixtures bridge
        working-directory: apps/web
        run: |
          npm ci
          npx prisma generate

      - name: Run CI test suite
        env:
          WEB_IMAGE_REPO: k3d-${{ env.REGISTRY_NAME }}.localhost:${{ env.REGISTRY_PORT }}/vidao-web
          WEB_IMAGE_TAG: ci
          NAMESPACE: ${{ env.NAMESPACE }}
          RELEASE: vidao-ci
          PYBIN: python
        run: ./deploy/scripts/run-ci-tests.sh

      - name: Dump cluster state on failure
        if: failure()
        run: |
          kubectl -n "$NAMESPACE" get all || true
          kubectl -n "$NAMESPACE" logs deployment/vidao-web --all-containers --tail=200 || true

  contract-integration:
    # Self-hosted homelab k3s with chainpool already running. Label-gated so
    # it only fires when a PR carries `run-contracts` or on the nightly cron.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'run-contracts')
    runs-on: [self-hosted, homelab-k3s]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest suite
        run: |
          python -m pip install --upgrade pip
          pip install "pytest>=8.3" "httpx>=0.27" "web3>=7.6" \
              "eth-account>=0.13" "psycopg2-binary>=2.9" "kubernetes>=31.0" \
              "pydantic>=2.9"

      - name: Generate contract artifact cache
        working-directory: contracts
        run: |
          npm ci
          npx tsx scripts/compile-and-cache.ts

      - name: Run full test suite
        run: |
          NS="vidao-test-$(openssl rand -hex 3)"
          ./deploy/scripts/run-tests.sh --namespace "$NS" -m "api or contracts"
